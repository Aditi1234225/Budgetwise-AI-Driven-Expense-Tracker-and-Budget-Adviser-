<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <h2>Register</h2>

  <form id="registerForm">
    <input id="name" type="text" placeholder="Full Name" required><br><br>
    <input id="email" type="email" placeholder="Email" required><br><br>
    <input id="password" type="password" placeholder="Password" required><br><br>
    <button type="submit">Register</button>
  </form>

  <div id="message"></div>

  <script>
    document.getElementById("registerForm").addEventListener("submit", function(e){
      e.preventDefault();
      document.getElementById("message").innerText = "Register feature coming soon 🔐";
    });
  </script>
</body>
</html>
